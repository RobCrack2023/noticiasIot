<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#g)"/>
  <!-- Grid lines -->
  <g stroke="#ffffff08" stroke-width="1">
    <line x1="0" y1="90" x2="800" y2="90"/><line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/><line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="160" y1="0" x2="160" y2="450"/><line x1="320" y1="0" x2="320" y2="450"/>
    <line x1="480" y1="0" x2="480" y2="450"/><line x1="640" y1="0" x2="640" y2="450"/>
  </g>
  <!-- Circuit dots -->
  <circle cx="160" cy="180" r="4" fill="#0ea5e920"/><circle cx="320" cy="270" r="4" fill="#0ea5e920"/>
  <circle cx="480" cy="180" r="4" fill="#0ea5e920"/><circle cx="640" cy="90"  r="4" fill="#0ea5e920"/>
  <!-- Monitor icon -->
  <rect x="340" y="155" width="120" height="80" rx="6" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
  <rect x="385" y="235" width="30" height="12" rx="2" fill="#3b82f660"/>
  <line x1="370" y1="247" x2="430" y2="247" stroke="#3b82f6" stroke-width="2"/>
  <!-- Screen content -->
  <rect x="352" y="166" width="96" height="58" rx="2" fill="#0ea5e915"/>
  <line x1="360" y1="178" x2="410" y2="178" stroke="#0ea5e9" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="360" y1="188" x2="432" y2="188" stroke="#0ea5e960" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="360" y1="198" x2="420" y2="198" stroke="#0ea5e960" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Label -->
  <text x="400" y="305" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#3b82f680" letter-spacing="3">TECNOLOGÍA</text>
</svg>
