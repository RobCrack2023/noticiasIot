<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — TechPulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>body{font-family:'Inter',system-ui,sans-serif;}</style>
</head>
<body class="min-h-screen bg-slate-950 flex items-center justify-center px-4">
  <div class="w-full max-w-sm">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex w-14 h-14 rounded-2xl bg-gradient-to-br from-sky-500 to-indigo-600 items-center justify-center shadow-xl mb-4">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-extrabold text-white">TechPulse</h1>
      <p class="text-slate-400 text-sm mt-1">Panel de administración</p>
    </div>

    <!-- Card -->
    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-2xl">
      {% if error %}
      <div class="mb-5 flex items-center gap-2.5 bg-red-950 border border-red-800 text-red-400 text-sm rounded-xl px-4 py-3">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        Contraseña incorrecta
      </div>
      {% endif %}

      <form method="post" action="/admin/login">
        <label class="block text-slate-400 text-xs font-semibold uppercase tracking-widest mb-2">Contraseña</label>
        <input type="password" name="password" autofocus
          class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition text-sm mb-5"
          placeholder="••••••••••••" />
        <button type="submit"
          class="w-full bg-gradient-to-r from-sky-500 to-indigo-500 hover:from-sky-400 hover:to-indigo-400 text-white font-semibold py-3 rounded-xl transition-all hover:scale-[1.02] active:scale-[.98] shadow-md text-sm">
          Entrar
        </button>
      </form>
    </div>

    <p class="text-center text-slate-600 text-xs mt-6">
      <a href="/" class="hover:text-slate-400 transition-colors">← Volver al sitio</a>
    </p>
  </div>
</body>
</html>
